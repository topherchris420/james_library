# Development Environment for R.A.I.N. Agentic Testing
#
# Use this for:
# - Running the agent in a sandboxed environment
# - Testing dangerous commands safely
# - Developing new skills/integrations
#
# Usage:
#   cd dev && ./cli.sh up
#   or from root: ./dev/cli.sh up
name: R.A.I.N.-dev
services:
  # ── The Agent (Development Image) ──
  # Builds from source using the 'dev' stage of the root Dockerfile
  R.A.I.N.-dev:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    container_name: R.A.I.N.-dev
    restart: unless-stopped
    environment:
      - R.A.I.N._GATEWAY_PORT=42617
      - SANDBOX_HOST=R.A.I.N.-sandbox
    secrets:
      - source: R.A.I.N._env
        target: R.A.I.N._env
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        if [ -f /run/secrets/R.A.I.N._env ]; then
          set -a
          . /run/secrets/R.A.I.N._env
          set +a
        fi
        exec R.A.I.N. gateway --port "${R.A.I.N._GATEWAY_PORT:-42617}" --host "[::]"
    volumes:
      # Mount single config file (avoids shadowing other files in .R.A.I.N.)
      - ../target/.R.A.I.N./config.toml:/R.A.I.N.-data/.R.A.I.N./config.toml
      # Mount shared workspace
      - ../playground:/R.A.I.N.-data/workspace
    ports:
      - "127.0.0.1:42617:42617"
    networks:
      - dev-net

  # ── The Sandbox (Ubuntu Environment) ──
  # A fully loaded Ubuntu environment for the agent to play in.
  sandbox:
    build:
      context: sandbox # Context relative to dev/
      dockerfile: Dockerfile
    container_name: R.A.I.N.-sandbox
    hostname: dev-box
    command: ["tail", "-f", "/dev/null"]
    working_dir: /home/developer/workspace
    user: developer
    environment:
      - TERM=xterm-256color
      - SHELL=/bin/bash
    volumes:
      - ../playground:/home/developer/workspace # Mount local playground
    networks:
      - dev-net

networks:
  dev-net:
    driver: bridge

secrets:
  R.A.I.N._env:
    file: ../.env
