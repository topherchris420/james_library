name: Deploy Documentation to GitHub Page

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'      
      - 'papers/**'
      - '*_SOUL.md'
      - '*.md'
      - 'mkdocs.yml'
  workflow_dispatch:   

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Stage documentation files
        run: |
          # Create subdirectories in the docs folder
          mkdir -p docs/agents docs/papers docs/records
          
          # Copy the root README to be the homepage
          cp README.md docs/index.md
          
          # Copy architecture and security docs
          cp ARCHITECTURE.md docs/
          cp SECURITY.md docs/
          
          # Copy the agent soul files
          cp AGENTS.md docs/agents/overview.md
          cp *_SOUL.md docs/agents/
          
          # Copy the theoretical papers
          cp -r papers/* docs/papers/
          
          # Copy the logs and roadmaps
          cp RAIN_LAB_MEETING_LOG.md docs/records/
          cp PRODUCT_ROADMAP.md docs/records/

      - name: Build static site
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
