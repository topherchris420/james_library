name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      RUFF_STAGE_1_ALLOWLIST: >-
        rain_lab.py
        rain_preflight_check.py
        tools.py
        truth_layer.py
      MYPY_STAGE_1_ALLOWLIST: >-
        truth_layer.py
        rain_preflight_check.py
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python scripts/ci/repo_integrity_guard.py
      - run: |
          python -m pip install --upgrade pip
          if [ -f requirements-pinned.txt ]; then
            pip install -r requirements-pinned.txt
          else
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev-pinned.txt ]; then
            pip install -r requirements-dev-pinned.txt
          else
            pip install -r requirements-dev.txt
          fi
      - name: Ruff baseline (E/F/W)
        run: ruff check . --output-format=full
      - name: Ruff maintainability allowlist (I/UP)
        if: ${{ matrix.python-version == '3.11' }}
        run: ruff check $RUFF_STAGE_1_ALLOWLIST --select I,UP --output-format=full
      - name: Static typing allowlist
        if: ${{ matrix.python-version == '3.11' }}
        run: mypy $MYPY_STAGE_1_ALLOWLIST
      - run: pytest tests/ -v -ra --tb=long

  governance-contracts:
    name: Governance Contract Checks
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect governance-relevant changes
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE_SHA" ]; then
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" HEAD || true)"
          if [ -z "$CHANGED_FILES" ]; then
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$CHANGED_FILES" | rg -q '^(src/|README\.md$|README\.(zh-CN|ja|ru|fr|vi)\.md$|docs/README\.md$|docs/README\.(zh-CN|ja|ru|fr)\.md$|docs/i18n/vi/README\.md$|docs/SUMMARY\.md$)'; then
            echo "run_checks=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_checks=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docs parity check
        if: steps.scope.outputs.run_checks == 'true'
        run: scripts/ci/docs_parity_check.sh

      - name: Architecture boundary check
        if: steps.scope.outputs.run_checks == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: scripts/ci/arch_boundary_check.sh
