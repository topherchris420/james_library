name: Workflow Sanity

on:
    pull_request:
        paths:
            - ".github/workflows/**"
            - ".github/*.yml"
            - ".github/*.yaml"
    push:
        paths:
            - ".github/workflows/**"
            - ".github/*.yml"
            - ".github/*.yaml"

concurrency:
    group: workflow-sanity-${{ github.event.pull_request.number || github.sha }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    no-tabs:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Resolve changed workflow files
              id: changed
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
              run: |
                  set -euo pipefail
                  base="$BASE_SHA"
                  if [[ "$EVENT_NAME" != "pull_request" && "$base" =~ ^0+$ ]]; then
                    base="$(git rev-parse HEAD^ 2>/dev/null || true)"
                  fi

                  if [[ -n "$base" ]]; then
                    files="$(git diff --diff-filter=d --name-only "$base" HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' '.github/*.yml' '.github/*.yaml' || true)"
                  else
                    files="$(git diff-tree --diff-filter=d --no-commit-id --name-only -r HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' '.github/*.yml' '.github/*.yaml' || true)"
                  fi

                  {
                    if [[ -n "$files" ]]; then
                      echo "count=$(printf '%s\n' "$files" | sed '/^$/d' | wc -l | tr -d ' ')"
                    else
                      echo "count=0"
                    fi
                    echo "files<<EOF"
                    printf '%s\n' "$files"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Fail on tabs in workflow files
              if: steps.changed.outputs.count != '0'
              shell: bash
              env:
                  CHANGED_FILES: ${{ steps.changed.outputs.files }}
              run: |
                  set -euo pipefail
                  python - <<'PY'
                  from __future__ import annotations

                  import os
                  import pathlib
                  import sys

                  files = [pathlib.Path(line) for line in os.environ["CHANGED_FILES"].splitlines() if line.strip()]
                  bad: list[str] = []
                  for path in files:
                    if b"\t" in path.read_bytes():
                      bad.append(str(path))

                  if bad:
                    print("Tabs found in workflow file(s):")
                    for path in bad:
                      print(f"- {path}")
                    sys.exit(1)
                  PY

    actionlint:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Resolve changed workflow files
              id: changed
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
              run: |
                  set -euo pipefail
                  base="$BASE_SHA"
                  if [[ "$EVENT_NAME" != "pull_request" && "$base" =~ ^0+$ ]]; then
                    base="$(git rev-parse HEAD^ 2>/dev/null || true)"
                  fi

                  if [[ -n "$base" ]]; then
                    files="$(git diff --diff-filter=d --name-only "$base" HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' '.github/*.yml' '.github/*.yaml' || true)"
                  else
                    files="$(git diff-tree --diff-filter=d --no-commit-id --name-only -r HEAD -- '.github/workflows/*.yml' '.github/workflows/*.yaml' '.github/*.yml' '.github/*.yaml' || true)"
                  fi

                  {
                    if [[ -n "$files" ]]; then
                      echo "count=$(printf '%s\n' "$files" | sed '/^$/d' | wc -l | tr -d ' ')"
                    else
                      echo "count=0"
                    fi
                    echo "files<<EOF"
                    printf '%s\n' "$files"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Install actionlint
              if: steps.changed.outputs.count != '0'
              shell: bash
              run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

            - name: Lint changed GitHub workflows
              if: steps.changed.outputs.count != '0'
              shell: bash
              env:
                  CHANGED_FILES: ${{ steps.changed.outputs.files }}
              run: |
                  set -euo pipefail
                  mapfile -t files <<< "${CHANGED_FILES}"
                  "$HOME/go/bin/actionlint" "${files[@]}"
