name: Quality Metrics Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-metrics:
    name: Compute quality metrics
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.92.0

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Ensure web/dist placeholder exists
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Collect test inventory
        run: |
          mkdir -p artifacts/test-artifacts artifacts/reports
          cargo nextest list --locked --message-format terse > artifacts/test-artifacts/test-list.txt

      - name: Run test suite (pass 1)
        run: cargo nextest run --locked --no-fail-fast --junit-xml artifacts/test-artifacts/run1.xml

      - name: Run test suite (pass 2)
        run: cargo nextest run --locked --no-fail-fast --junit-xml artifacts/test-artifacts/run2.xml

      - name: Build quality metrics report
        run: |
          python3 scripts/ci/quality_metrics_report.py \
            --artifacts-dir artifacts \
            --output-json artifacts/reports/quality-metrics-report.json \
            --output-md artifacts/reports/quality-metrics-report.md

      - name: Publish markdown summary
        run: cat artifacts/reports/quality-metrics-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality metrics artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: quality-metrics-report
          path: artifacts/reports/
          if-no-files-found: error
