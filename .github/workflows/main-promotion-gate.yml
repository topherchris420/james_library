name: Main Promotion Gate (Retired)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired-notice:
    name: Direct-to-Main Policy Notice
    runs-on: ubuntu-latest
    steps:
      - name: Explain retired workflow
        run: |
          echo "The repository now uses a single default branch policy."
          echo "All contributor pull requests target 'main' directly."
          echo "The legacy dev -> main promotion gate is retired and no longer participates in merge enforcement."
