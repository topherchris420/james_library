[tool.ruff]
target-version = "py310"
line-length = 120

# Exclude vendored / generated code that we don't own
exclude = [
    "rlm-main/",
    "hello_os.py",       # 53k-line Colab export — not maintained here
    ".git",
    "__pycache__",
]

[tool.ruff.lint]
# Stage 0 baseline: keep the repo on stable pycodestyle/pyflakes coverage.
# Stage 1 maintainability rollout is enforced in CI on an allowlist via `--select I,UP`.
select = ["E", "F", "W"]
ignore = [
    "E402",   # module-level import not at top — scripts do sys.path manipulation
    "F541",   # f-string without placeholders — cosmetic, not a bug
    "F841",   # local variable assigned but never used — clean up later
    "W605",   # invalid escape sequence — raw-string Windows paths
]

[tool.ruff.lint.per-file-ignores]
# Prompt template file: all long lines are natural-language prompt strings
"graph_r1_engine/graphr1/prompt.py" = ["E501"]
# Test fixture strings: exact README content must be preserved for substring matching
"tests/test_product_cohesion_docs.py" = ["E501"]

[tool.mypy]
python_version = "3.10"
pretty = true
show_error_codes = true
warn_unused_configs = true
files = [
    "truth_layer.py",
    "rain_preflight_check.py",
]

[[tool.mypy.overrides]]
module = ["rlm"]
ignore_missing_imports = true

[tool.rain.python_validation]
ruff_stage_0_rules = ["E", "F", "W"]
ruff_stage_1_rules = ["I", "UP"]
ruff_stage_1_allowlist = [
    "rain_lab.py",
    "rain_preflight_check.py",
    "tools.py",
    "truth_layer.py",
]
ruff_stage_2_candidate_rules = ["B"]
static_typing_stage_1_allowlist = [
    "truth_layer.py",
    "rain_preflight_check.py",
]
static_typing_stage_2_allowlist = [
    "rain_lab.py",
    "tools.py",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
