[tool.ruff]
target-version = "py310"
line-length = 120

# Exclude vendored / generated code that we don't own
exclude = [
    "rlm-main/",
    "hello_os.py",       # 53k-line Colab export — not maintained here
    ".git",
    "__pycache__",
]

[tool.ruff.lint]
# Catch style, bugs, and unused code; remaining ignores are justified below
select = ["E", "F", "W"]
ignore = [
    "E402",   # module-level import not at top — scripts do sys.path manipulation
    "F541",   # f-string without placeholders — cosmetic, not a bug
    "F841",   # local variable assigned but never used — clean up later
    "W605",   # invalid escape sequence — raw-string Windows paths
]

[tool.ruff.lint.per-file-ignores]
# Prompt template file: all long lines are natural-language prompt strings
"graph_r1_engine/graphr1/prompt.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
