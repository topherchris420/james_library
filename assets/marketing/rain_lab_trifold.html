  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #ec3013;\n  --color-accent-2: #e15b47;\n  --color-divider: color-mix(in srgb, #201e1d 40%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #fff2ef;\n  --color-accent-200: #ffe0d9;\n  --color-accent-300: #ffc4b8;\n  --color-accent-400: #ff9783;\n  --color-accent-500: #ff563c;\n  --color-accent-600: #dd2b0f;\n  --color-accent-700: #ae1800;\n  --color-accent-800: #7c1405;\n  --color-accent-900: #4d170e;\n\n  --color-accent-2-100: #fff2ef;\n  --color-accent-2-200: #ffe0da;\n  --color-accent-2-300: #ffc4b9;\n  --color-accent-2-400: #ff9784;\n  --color-accent-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 13px; line-height: 1.2; color: var(--color-text);\n  background: transparent; border: 1px solid transparent;\n  padding: calc(var(--space-2) * 0.85) var(--space-3);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 34px; height: 34px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n  <script src=\"153f8f43-0752-4c29-babf-2cd100764290\"><\u002Fscript>\n  <script src=\"9a3efe03-fd21-4a2e-b43a-f7414b2ec4f9\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: var(--color-neutral-200); }\n    a { color: #201e1d; text-decoration: none; }\n    a:hover { color: #ec3013; }\n    @media print {\n      .fold-guide { display: none !important; }\n      .trifold-side { box-shadow: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"doc-page\" size=\"letter\" orientation=\"landscape\" margin=\"0\" hint-size=\"100%,100%\">\n\n  <!-- ================= SIDE 1 — OUTSIDE: [inside flap] [back cover] [FRONT COVER] ================= -->\n  <div class=\"trifold-side\" data-screen-label=\"Side 1 — Outside\" style=\"width: 11in; height: 8.5in; display: grid; grid-template-columns: 1fr 1fr 1fr; position: relative; background: var(--color-bg); overflow: hidden; break-after: page;\">\n\n    <!-- Panel: inside flap (tucks in; reader sees it on first open) -->\n    <div style=\"padding: 0.5in 0.45in 0.5in 0.5in; display: flex; flex-direction: column; border-top: 2px solid var(--color-divider);\">\n      <div style=\"font-family: var(--font-body); font-size: 8pt; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-accent-700); margin-top: 0.18in;\">Who it serves<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-heading); font-weight: 800; font-size: 17pt; line-height: 1.15; color: var(--color-text); margin: 0.12in 0 0.25in 0; text-wrap: balance;\">Answers that hold up under scrutiny.<\u002Fh2>\n\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.16in 0 0.2in 0;\">\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 10.5pt; color: var(--color-text);\">Researchers &amp; analysts<\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.06in 0 0 0;\">Compare competing hypotheses, preserve disagreement, and keep auditable reasoning trails.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.16in 0 0.2in 0;\">\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 10.5pt; color: var(--color-text);\">Founders &amp; product leads<\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.06in 0 0 0;\">Stress-test strategic decisions through structured debate before committing roadmap or budget.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); border-bottom: 2px solid var(--color-divider); padding: 0.16in 0 0.2in 0;\">\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 10.5pt; color: var(--color-text);\">Operators &amp; technical teams<\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.06in 0 0 0;\">Turn open discussions into verifiable outputs that can be reviewed, shared, and replayed.<\u002Fp>\n      <\u002Fdiv>\n\n      <p style=\"font-family: var(--font-body); font-size: 10.5pt; line-height: 1.5; font-weight: 600; color: var(--color-accent-700); margin: auto 0 0 0; text-wrap: pretty;\">Most tools help you find papers. R.A.I.N. Lab helps you think with a room full of experts.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Panel: back cover -->\n    <div style=\"padding: 0.5in 0.45in; display: flex; flex-direction: column; border-top: 2px solid var(--color-divider);\">\n      <div style=\"margin-top: 0.18in; display: flex; flex-direction: column; gap: 2pt;\">\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 13pt; color: var(--color-text);\">R.A.I.N. Lab<\u002Fdiv>\n        <div style=\"font-family: var(--font-body); font-size: 8pt; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-neutral-600);\">Vers3Dynamics<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: auto;\">\n        <div style=\"border-top: 2px solid var(--color-divider); padding: 0.14in 0;\">\n          <div style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-neutral-600);\">Live demo<\u002Fdiv>\n          <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 12pt; color: var(--color-text); margin-top: 2pt;\">rainlabteam.vercel.app<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top: 2px solid var(--color-divider); padding: 0.14in 0;\">\n          <div style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-neutral-600);\">Web<\u002Fdiv>\n          <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 12pt; color: var(--color-text); margin-top: 2pt;\">vers3dynamics.com<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top: 2px solid var(--color-divider); border-bottom: 2px solid var(--color-divider); padding: 0.14in 0;\">\n          <div style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-neutral-600);\">Source<\u002Fdiv>\n          <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11pt; color: var(--color-text); margin-top: 2pt;\">github.com/topherchris420/james_library<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 8.5pt; line-height: 1.5; color: var(--color-neutral-600); margin: 0.2in 0 0 0;\">Open source under the MIT license. © 2026 Vers3Dynamics.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Panel: FRONT COVER (rightmost) -->\n    <sc-if value=\"{{ redCover }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background: var(--color-accent); color: #ffffff; padding: 0.5in; display: flex; flex-direction: column;\">\n        <div style=\"font-family: var(--font-body); font-size: 8pt; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #ffffff; margin-top: 0.18in;\">Vers3Dynamics<\u002Fdiv>\n        <h1 style=\"font-family: var(--font-heading); font-weight: 800; font-size: 46pt; line-height: 0.98; letter-spacing: -0.01em; color: #ffffff; margin: 0.2in 0 0 0;\">R.A.I.N.<br>Lab<\u002Fh1>\n        <div style=\"font-family: var(--font-body); font-size: 10pt; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #ffffff; margin-top: 0.14in; border-top: 2px solid #ffffff; padding-top: 0.12in;\">Recursive Architecture of Intelligent Nexus<\u002Fdiv>\n        <div class=\"grayscale\" style=\"margin-top: 0.35in; border: 2px solid #ffffff;\">\n          <img src=\"461c8a62-9672-4d71-870e-43599b561069\" alt=\"R.A.I.N. Lab mark\" style=\"display: block; width: 100%; height: 1.7in; object-fit: cover;\">\n        <\u002Fdiv>\n        <div style=\"margin-top: auto;\">\n          <p style=\"font-family: var(--font-body); font-size: 12pt; line-height: 1.4; font-weight: 600; color: #ffffff; margin: 0; text-wrap: pretty;\">A private-by-default expert panel in a box.<\u002Fp>\n          <p style=\"font-family: var(--font-body); font-size: 9.5pt; color: #ffffff; margin: 0.14in 0 0 0;\">rainlabteam.vercel.app<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ lightCover }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background: var(--color-bg); color: var(--color-text); padding: 0.5in; display: flex; flex-direction: column; border-top: 2px solid var(--color-divider);\">\n        <div style=\"font-family: var(--font-body); font-size: 8pt; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-accent-700); margin-top: 0.18in;\">Vers3Dynamics<\u002Fdiv>\n        <h1 style=\"font-family: var(--font-heading); font-weight: 800; font-size: 46pt; line-height: 0.98; letter-spacing: -0.01em; color: var(--color-text); margin: 0.2in 0 0 0;\">R.A.I.N.<br>Lab<\u002Fh1>\n        <div style=\"font-family: var(--font-body); font-size: 10pt; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-accent-700); margin-top: 0.14in; border-top: 2px solid var(--color-divider); padding-top: 0.12in;\">Recursive Architecture of Intelligent Nexus<\u002Fdiv>\n        <div class=\"grayscale\" style=\"margin-top: 0.35in; border: 2px solid var(--color-divider);\">\n          <img src=\"461c8a62-9672-4d71-870e-43599b561069\" alt=\"R.A.I.N. Lab mark\" style=\"display: block; width: 100%; height: 1.7in; object-fit: cover;\">\n        <\u002Fdiv>\n        <div style=\"margin-top: auto;\">\n          <p style=\"font-family: var(--font-body); font-size: 12pt; line-height: 1.4; font-weight: 600; color: var(--color-text); margin: 0; text-wrap: pretty;\">A private-by-default expert panel in a box.<\u002Fp>\n          <p style=\"font-family: var(--font-body); font-size: 9.5pt; color: var(--color-accent-700); margin: 0.14in 0 0 0;\">rainlabteam.vercel.app<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showFoldGuides }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"fold-guide\" style=\"position: absolute; left: 3.6667in; top: 0; bottom: 0; border-left: 1px dashed rgba(32,30,29,0.35); z-index: 5; pointer-events: none;\"><\u002Fdiv>\n      <div class=\"fold-guide\" style=\"position: absolute; left: 7.3333in; top: 0; bottom: 0; border-left: 1px dashed rgba(32,30,29,0.35); z-index: 5; pointer-events: none;\"><\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ================= SIDE 2 — INSIDE SPREAD ================= -->\n  <div class=\"trifold-side\" data-screen-label=\"Side 2 — Inside spread\" style=\"width: 11in; height: 8.5in; display: grid; grid-template-columns: 1fr 1fr 1fr; position: relative; background: var(--color-bg); overflow: hidden;\">\n\n    <!-- Inside left: what it does -->\n    <div style=\"padding: 0.5in 0.45in 0.5in 0.5in; display: flex; flex-direction: column; border-top: 2px solid var(--color-divider);\">\n      <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 9pt; color: var(--color-accent-700); margin-top: 0.18in;\">01<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-heading); font-weight: 800; font-size: 19pt; line-height: 1.12; color: var(--color-text); margin: 0.1in 0 0.18in 0; text-wrap: balance;\">One question.<br>A full review panel.<\u002Fh2>\n      <p style=\"font-family: var(--font-body); font-size: 10pt; line-height: 1.55; color: var(--color-text); margin: 0 0 0.22in 0; text-wrap: pretty;\">Submit a raw research question. The R.A.I.N. Lab convenes four expert agents with distinct constraints and returns the strongest explanations, the disagreements, and the next moves.<\u002Fp>\n\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.14in 0;\">\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0;\"><strong style=\"color: var(--color-text);\">Structured meetings.<\u002Fstrong> One question becomes a four-agent session, each seat bound to different evidence and constraints.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.14in 0;\">\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0;\"><strong style=\"color: var(--color-text);\">Grounded claims.<\u002Fstrong> Strong assertions are anchored in papers or explicit evidence, never in fluent speculation.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.14in 0;\">\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0;\"><strong style=\"color: var(--color-text);\">Adversarial review.<\u002Fstrong> The strongest counter-argument is placed on the page before any commitment is made.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); border-bottom: 2px solid var(--color-divider); padding: 0.14in 0;\">\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0;\"><strong style=\"color: var(--color-text);\">Concrete next moves.<\u002Fstrong> Each session ends with the paper, experiment, or measurement most likely to validate or kill the idea.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Inside middle: the panel -->\n    <div style=\"padding: 0.5in 0.45in; display: flex; flex-direction: column; border-top: 2px solid var(--color-divider);\">\n      <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 9pt; color: var(--color-accent-700); margin-top: 0.18in;\">02<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-heading); font-weight: 800; font-size: 19pt; line-height: 1.12; color: var(--color-text); margin: 0.1in 0 0.18in 0;\">The panel.<\u002Fh2>\n      <p style=\"font-family: var(--font-body); font-size: 10pt; line-height: 1.55; color: var(--color-text); margin: 0 0 0.22in 0; text-wrap: pretty;\">Each agent carries a defined voice, expertise, and set of constraints into every question.<\u002Fp>\n\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.15in 0;\">\n        <div style=\"display: flex; align-items: baseline; gap: 8pt;\">\n          <span style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11.5pt; color: var(--color-text);\">James<\u002Fspan>\n          <span style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent-700);\">Lead Scientist<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.05in 0 0 0;\">Draws directly from the source literature, cites metrics, and states plainly when data is missing.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.15in 0;\">\n        <div style=\"display: flex; align-items: baseline; gap: 8pt;\">\n          <span style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11.5pt; color: var(--color-text);\">Jasmine<\u002Fspan>\n          <span style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent-700);\">Hardware Architect<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.05in 0 0 0;\">Tests every proposal against real material and energy constraints. If it cannot be built, she knows why.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.15in 0;\">\n        <div style=\"display: flex; align-items: baseline; gap: 8pt;\">\n          <span style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11.5pt; color: var(--color-text);\">Luca<\u002Fspan>\n          <span style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent-700);\">Field Tomographer<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.05in 0 0 0;\">Identifies geometric patterns others miss, then seeks the mathematics to ground the intuition.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); border-bottom: 2px solid var(--color-divider); padding: 0.15in 0;\">\n        <div style=\"display: flex; align-items: baseline; gap: 8pt;\">\n          <span style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11.5pt; color: var(--color-text);\">Elena<\u002Fspan>\n          <span style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent-700);\">Quantum Information Theorist<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.05in 0 0 0;\">Demands formal rigor, runs logical verification, and catches the errors everyone else misses.<\u002Fp>\n      <\u002Fdiv>\n\n      <p style=\"font-family: var(--font-body); font-size: 8.5pt; line-height: 1.5; color: var(--color-neutral-600); margin: auto 0 0 0;\">Each agent's full reasoning principles are defined in an open SOUL file — part of the product, not marketing.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Inside right: privacy, TRIBE v2, begin -->\n    <div style=\"padding: 0.5in 0.5in 0.5in 0.45in; display: flex; flex-direction: column; border-top: 2px solid var(--color-divider);\">\n      <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 9pt; color: var(--color-accent-700); margin-top: 0.18in;\">03<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-heading); font-weight: 800; font-size: 19pt; line-height: 1.12; color: var(--color-text); margin: 0.1in 0 0.18in 0;\">Private by default.<\u002Fh2>\n      <p style=\"font-family: var(--font-body); font-size: 10pt; line-height: 1.55; color: var(--color-text); margin: 0 0 0.24in 0; text-wrap: pretty;\">The lab runs entirely on your machine with LM Studio or Ollama — no cloud calls, no telemetry, no data sharing. Your questions and reasoning trails never leave the room.<\u002Fp>\n\n      <div style=\"border-top: 2px solid var(--color-divider); padding: 0.16in 0 0.2in 0;\">\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11.5pt; color: var(--color-text);\">TRIBE v2 brain encoding<\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.06in 0 0 0;\">Predict fMRI activation patterns across 20,484 cortical vertices from video, audio, or text — and validate whether a stimulus engages the brain regions your hypothesis claims, inside the same meeting.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"border-top: 2px solid var(--color-divider); border-bottom: 2px solid var(--color-divider); padding: 0.16in 0 0.2in 0; margin-bottom: 0.3in;\">\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 11.5pt; color: var(--color-text);\">Begin in one line<\u002Fdiv>\n        <p style=\"font-family: var(--font-body); font-size: 9.5pt; line-height: 1.5; color: var(--color-neutral-700); margin: 0.06in 0 0 0;\">Try the live demo with no setup, or run locally with Python 3.12+:<\u002Fp>\n        <div style=\"background: var(--color-text); color: var(--color-bg); font-family: var(--font-body); font-weight: 600; font-size: 9.5pt; padding: 8pt 10pt; margin-top: 0.1in;\">python rain_lab.py<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: auto; background: var(--color-accent); color: #ffffff; padding: 0.24in;\">\n        <div style=\"font-family: var(--font-body); font-size: 7.5pt; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;\">Live demo — no setup<\u002Fdiv>\n        <div style=\"font-family: var(--font-heading); font-weight: 800; font-size: 14pt; margin-top: 4pt;\">rainlabteam.vercel.app<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showFoldGuides }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"fold-guide\" style=\"position: absolute; left: 3.6667in; top: 0; bottom: 0; border-left: 1px dashed rgba(32,30,29,0.35); z-index: 5; pointer-events: none;\"><\u002Fdiv>\n      <div class=\"fold-guide\" style=\"position: absolute; left: 7.3333in; top: 0; bottom: 0; border-left: 1px dashed rgba(32,30,29,0.35); z-index: 5; pointer-events: none;\"><\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;redCover&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Cover&quot; },\n  &quot;showFoldGuides&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Print&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const red = this.props.redCover ?? true;\n    return {\n      redCover: red,\n      lightCover: !red,\n      showFoldGuides: this.props.showFoldGuides ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
